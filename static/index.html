<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin Agent</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f7;--card:#ffffff;--text1:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --accent:#0071e3;--accent-h:#0077ed;--border:#e8e8ed;--radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font);background:var(--bg);color:var(--text1);line-height:1.5;min-height:100vh}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}

.nav{position:sticky;top:0;z-index:100;background:rgba(245,245,247,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:980px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-size:1.05rem;font-weight:600;letter-spacing:-.01em;color:var(--text1)}
.nav-brand span{color:var(--accent)}
.lang-toggle{display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:500;color:var(--text2);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 2px;overflow:hidden}
.lang-toggle button{border:none;background:transparent;color:var(--text2);padding:4px 10px;border-radius:16px;font-size:.8rem;font-weight:500;transition:all .2s}
.lang-toggle button.active{background:var(--accent);color:#fff}

.hero{max-width:980px;margin:0 auto;padding:80px 24px 48px;text-align:center}
.hero h1{font-size:3rem;font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.hero h1 .gradient{background:linear-gradient(90deg,#0071e3,#34c759,#0071e3);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.hero p{font-size:1.2rem;color:var(--text2);max-width:520px;margin:0 auto;font-weight:400}

.main{max-width:980px;margin:0 auto;padding:0 24px 80px}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px;margin-bottom:24px;transition:box-shadow .3s}
.card:hover{box-shadow:var(--shadow-lg)}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.01em;text-transform:uppercase}
.form-group textarea{width:100%;min-height:100px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-size:1rem;font-family:var(--font);resize:vertical;transition:border-color .2s,box-shadow .2s;color:var(--text1);background:var(--bg)}
.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-group input,.form-group select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:.95rem;font-family:var(--font);transition:border-color .2s,box-shadow .2s;color:var(--text1);background:var(--bg)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.15)}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:980px;padding:14px 32px;font-size:1rem;font-weight:600;letter-spacing:-.01em;transition:all .2s}
.btn-primary:hover{background:var(--accent-h);transform:scale(1.02)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.status-bar{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:var(--radius-sm);margin-bottom:20px;font-size:.9rem;font-weight:500}
.status-bar.running{background:rgba(0,113,227,.08);color:var(--accent)}
.status-bar.completed{background:rgba(52,199,89,.08);color:#34c759}
.status-bar.failed{background:rgba(255,59,48,.08);color:#ff3b30}
.status-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.status-bar.running .status-dot{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.report{font-size:.95rem;line-height:1.7;color:var(--text1);white-space:pre-wrap;word-break:break-word}
.report h3{font-size:1.1rem;font-weight:600;margin:20px 0 8px}

.evidence-list{margin-top:16px}
.evidence-item{padding:14px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;transition:border-color .2s}
.evidence-item:hover{border-color:var(--accent)}
.evidence-source{font-size:.8rem;font-weight:600;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}
.evidence-summary{font-size:.9rem;color:var(--text1);line-height:1.6}

.trace-timeline{margin-top:16px;padding-left:20px;border-left:2px solid var(--border)}
.trace-item{position:relative;padding:8px 0 8px 20px;font-size:.85rem}
.trace-item::before{content:'';position:absolute;left:-6px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--card);border:2px solid var(--accent)}
.trace-stage{font-weight:600;color:var(--text1)}
.trace-detail{color:var(--text2);margin-top:2px}

.fade-in{animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.section-title{font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}

.providers-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:980px;font-size:.78rem;font-weight:500;background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.chip strong{color:var(--text1);font-weight:600}

.footer{text-align:center;padding:40px 24px;color:var(--text3);font-size:.8rem}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">Fin<span>Agent</span></div>
    <div class="lang-toggle">
      <button id="btnZh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1><span class="gradient" data-i18n="heroTitle"></span></h1>
  <p data-i18n="heroDesc"></p>
</div>

<div class="main">
  <div class="card">
    <div class="form-group">
      <label data-i18n="labelQuestion"></label>
      <textarea id="inputQuestion" data-i18n-ph="phQuestion"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label data-i18n="labelTicker"></label>
        <input id="inputTicker" type="text" data-i18n-ph="phTicker">
      </div>
      <div class="form-group">
        <label data-i18n="labelTemplate"></label>
        <select id="selectTemplate">
          <option value="open_research">open_research</option>
        </select>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn-primary" id="btnSubmit" onclick="submitResearch()">
        <span data-i18n="btnSubmit" id="btnText"></span>
      </button>
    </div>
  </div>

  <div id="resultArea"></div>
</div>

<div class="footer">
  <span data-i18n="footer"></span>
</div>

<script>
let currentLang = 'zh';
let polling = null;

const dict = {
  heroTitle:       { zh: '智能金融研究助手', en: 'Intelligent Financial Research Assistant' },
  heroDesc:        { zh: '输入你的研究问题，AI 将自动完成市场数据采集、新闻检索与深度分析，生成结构化研究报告。', en: 'Enter your research question and AI will automatically collect market data, search news, perform deep analysis, and generate a structured research report.' },
  labelQuestion:   { zh: '研究问题', en: 'Research Question' },
  phQuestion:      { zh: '例如：比亚迪近三年盈利趋势如何？是否有持续增长动力？', en: 'e.g. What is BYD\'s profit trend over the past three years? Is there sustained growth momentum?' },
  labelTicker:     { zh: '股票代码（可选）', en: 'Ticker Symbol (Optional)' },
  phTicker:        { zh: '例如：AAPL, 002594.SZ', en: 'e.g. AAPL, 002594.SZ' },
  labelTemplate:   { zh: '研究模板', en: 'Research Template' },
  btnSubmit:       { zh: '开始研究', en: 'Start Research' },
  btnSubmitting:   { zh: '研究进行中…', en: 'Research in progress…' },
  footer:          { zh: 'Fin Agent — 由 AI 驱动的金融研究平台', en: 'Fin Agent — AI-Powered Financial Research Platform' },
  running:         { zh: '研究进行中…', en: 'Research in progress…' },
  completed:       { zh: '研究完成', en: 'Research completed' },
  failed:          { zh: '研究失败', en: 'Research failed' },
  report:          { zh: '研究报告', en: 'Research Report' },
  evidence:        { zh: '证据来源', en: 'Evidence' },
  trace:           { zh: '执行追踪', en: 'Execution Trace' },
  runId:           { zh: '运行 ID', en: 'Run ID' },
  stages:          { zh: '计划阶段', en: 'Planned Stages' },
  error:           { zh: '请求出错，请稍后重试', en: 'Request error, please try again later' },
  source:          { zh: '来源', en: 'Source' },
};

function t(key) { return (dict[key] && dict[key][currentLang]) || key; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key][lang];
  });

  document.querySelectorAll('[data-i18n-ph]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-ph');
    if (dict[key]) el.placeholder = dict[key][lang];
  });
}

async function submitResearch() {
  var question = document.getElementById('inputQuestion').value.trim();
  if (!question) { document.getElementById('inputQuestion').focus(); return; }

  var ticker = document.getElementById('inputTicker').value.trim() || null;
  var template = document.getElementById('selectTemplate').value;

  var btn = document.getElementById('btnSubmit');
  var btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.textContent = t('btnSubmitting');
  btn.insertAdjacentHTML('afterbegin', '<span class="spinner" id="btnSpinner"></span>');

  document.getElementById('resultArea').innerHTML = '';

  try {
    var res = await fetch('/v1/research/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question, ticker: ticker, template: template })
    });

    if (!res.ok) {
      var err = await res.text();
      throw new Error(err);
    }

    var data = await res.json();
    renderResult(data);

    if (data.status === 'running') {
      startPolling(data.run_id);
    }
  } catch (e) {
    renderError(e.message);
  } finally {
    btn.disabled = false;
    btnText.textContent = t('btnSubmit');
    var spinner = document.getElementById('btnSpinner');
    if (spinner) spinner.remove();
  }
}

function startPolling(runId) {
  if (polling) clearInterval(polling);
  polling = setInterval(async function() {
    try {
      var res = await fetch('/v1/research/runs/' + runId);
      if (!res.ok) return;
      var data = await res.json();
      renderResult(data);
      if (data.status !== 'running') {
        clearInterval(polling);
        polling = null;
      }
    } catch (e) {}
  }, 3000);
}

function statusClass(s) {
  if (s === 'running') return 'running';
  if (s === 'completed') return 'completed';
  return 'failed';
}

function renderResult(data) {
  var sc = statusClass(data.status);
  var statusLabel = t(data.status) || data.status;

  var html = '<div class="card fade-in">';
  html += '<div class="status-bar ' + sc + '"><span class="status-dot"></span>' + escHtml(statusLabel) + '</div>';

  html += '<div class="providers-chips">';
  html += '<span class="chip"><strong>' + escHtml(t('runId')) + ':</strong> ' + escHtml(data.run_id) + '</span>';
  if (data.providers) {
    Object.keys(data.providers).forEach(function(k) {
      html += '<span class="chip"><strong>' + escHtml(k) + ':</strong> ' + escHtml(data.providers[k]) + '</span>';
    });
  }
  html += '</div>';

  if (data.planned_stages && data.planned_stages.length) {
    html += '<div class="section-title">' + escHtml(t('stages')) + '</div>';
    html += '<div class="providers-chips">';
    data.planned_stages.forEach(function(s) {
      html += '<span class="chip">' + escHtml(s) + '</span>';
    });
    html += '</div>';
  }

  if (data.report) {
    html += '<div class="section-title">' + escHtml(t('report')) + '</div>';
    html += '<div class="report">' + formatReport(data.report) + '</div>';
  }

  if (data.evidence && data.evidence.length) {
    html += '<div class="evidence-list" style="margin-top:24px">';
    html += '<div class="section-title">' + escHtml(t('evidence')) + '</div>';
    data.evidence.forEach(function(e) {
      html += '<div class="evidence-item"><div class="evidence-source">' + escHtml(t('source')) + ': ' + escHtml(e.source) + '</div><div class="evidence-summary">' + escHtml(e.summary) + '</div></div>';
    });
    html += '</div>';
  }

  if (data.trace && data.trace.length) {
    html += '<div style="margin-top:24px">';
    html += '<div class="section-title">' + escHtml(t('trace')) + '</div>';
    html += '<div class="trace-timeline">';
    data.trace.forEach(function(tr) {
      html += '<div class="trace-item"><div class="trace-stage">' + escHtml(tr.stage) + '</div><div class="trace-detail">' + escHtml(tr.detail) + '</div></div>';
    });
    html += '</div></div>';
  }

  html += '</div>';
  document.getElementById('resultArea').innerHTML = html;
}

function renderError(msg) {
  document.getElementById('resultArea').innerHTML =
    '<div class="card fade-in"><div class="status-bar failed"><span class="status-dot"></span>' + escHtml(t('error')) + '</div><p style="color:var(--text2);font-size:.9rem">' + escHtml(msg) + '</p></div>';
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function formatReport(text) {
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '<h3>$1</h3>');
}

setLang('zh');
</script>
</body>
</html>
